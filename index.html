<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>김민 | 프로필 카드</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="presentation-slide" id="main-slide">
    <!-- Left Visual Column -->
    <div class="slide-visual">
      <div class="avatar-container">
        <img src="profile_avatar.png" alt="Profile Avatar" class="avatar-img">
      </div>
      <div class="visual-badge">오늘은 최선을💪<br>내일은 여유를☕</div>
      <div class="visual-contact">
        <p class="contact-title">CONTACT</p>
        <p><span>📞</span> 010-0000-0000</p>
        <p><span>✉️</span> abc@gmail.com</p>
      </div>
      <div class="contact-links visual-contact-links">
        <a href="https://instagram.com" target="_blank" rel="noopener noreferrer" class="btn-contact" title="Instagram" id="link-instagram">
          <svg viewBox="0 0 24 24">
            <path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.051.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/>
          </svg>
        </a>
        <a href="https://youtube.com" target="_blank" rel="noopener noreferrer" class="btn-contact" title="YouTube" id="link-youtube">
          <svg viewBox="0 0 24 24">
            <path d="M23.498 6.163a3.003 3.003 0 00-2.11-2.11C19.518 3.545 12 3.545 12 3.545s-7.518 0-9.388.508a3.003 3.003 0 00-2.11 2.11C0 8.033 0 12 0 12s0 3.967.502 5.837a3.003 3.003 0 002.11 2.11c1.87.508 9.388.508 9.388.508s7.518 0 9.388-.508a3.003 3.003 0 002.11-2.11C24 15.967 24 12 24 12s0-3.967-.502-5.837zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/>
          </svg>
        </a>
        <a href="https://section.blog.naver.com/BlogHome.naver?directoryNo=0&currentPage=1&groupId=0" target="_blank" rel="noopener noreferrer" class="btn-contact" title="Naver Blog" id="link-naver-blog">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M6 7h3.5l4.5 6.5V7h3.5v10h-3.5l-4.5-6.5V17H6V7z" />
          </svg>
        </a>
      </div>
    </div>

    <!-- Right Content Column -->
    <div class="slide-content">
      <div class="profile-header">
        <h1 class="profile-name">김민수</h1>
        <div class="profile-subname">Kim Minsoo</div>
        <div class="profile-divider"></div>
        <div class="profile-title">Video Producer</div>
        <div class="profile-title">Film Director</div>
      </div>

      <p class="profile-bio">
        카메라는 장면을 기록하지만,
        <br>
        영상은 감정을 기록합니다.
      </p>

      <div class="profile-divider"></div>
      <div class="award-section">
        <div class="award-header">🏆 Award</div>
        <div class="award-description">참잘했상🏅</div>
      </div>
      <div class="profile-divider"></div>
      <div class="profile-major">동의대학교 신문방송학과/영화학과 졸업</div>

      <div class="portfolio-section">
        <h3 class="interests-title">포트폴리오</h3>
        <div class="interests-tags">
          <!-- Interactivity via script.js -->
          <a href="detail.html?tag=short-film" class="tag" data-tag="short-film">
            <span>🎬</span> 단편영화
          </a>
          <a href="detail.html?tag=contest" class="tag" data-tag="contest">
            <span>🏆</span> 공모전
          </a>
          <a href="detail.html?tag=documentary" class="tag" data-tag="documentary">
            <span>🎥</span> 다큐멘터리
          </a>
          <a href="detail.html?tag=other-projects" class="tag" data-tag="other-projects">
            <span>📁</span> 기타 프로젝트
          </a>
        </div>
      </div>

    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
